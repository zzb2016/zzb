<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的商店</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 30px;
        }

        .title {
            font-size: 24px;
            color: #555;
        }

        .back-btn {
            padding: 12px 30px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #3367d6;
        }
    </style>
</head>
<body>
    <div class="title">还没有任何商品哦！</div>
    <button class="back-btn" onclick="window.location.href='index.html'">返回</button>
</body>
</html>
