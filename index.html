        body {

        }

        .avatar {

            height: 120px;
            border-radius: 50%;

            border: 4px solid #4285f4;

        h1 {
            text-align: center;

        .title {

        }

        }

            margin: 20px 0 10px;
            font-size: 20px;
            border-left: 4px solid #4285f4;
            padding-left: 10px;
        }

        .contact {
            text-align: center;
            margin-top: 20px;
        }

        .contact a {
            color: #4285f4;
            text-decoration: none;
            margin: 0 10px;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        /* 按钮通用样式 */
        .btn {
            display: block;
            width: 200px;
            height: 50px;
            line-height: 50px;
            background-color: #4285f4;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 18px;
            margin: 20px auto;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #3367d6;
        }
    </style>
