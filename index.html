<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的自我介绍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        /* 页面容器 */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        /* 头像 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 20px;
            object-fit: cover;
            border: 4px solid #4285f4;
        }

        /* 标题 */
        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 10px;
        }

        .title {
            text-align: center;
            color: #666;
            font-size: 18px;
            margin-bottom: 25px;
        }

        /* 段落 */
        p {
            margin-bottom: 15px;
            font-size: 16px;
        }

        /* 列表 */
        ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        li {
            margin-bottom: 8px;
        }

        /* 模块标题 */
        .section-title {
            color: #4285f4;
            margin: 20px 0 10px;
            font-size: 20px;
            border-left: 4px solid #4285f4;
            padding-left: 10px;
        }

        /* 联系方式 */
        .contact {
            text-align: center;
            margin-top: 20px;
        }

        .contact a {
            color: #4285f4;
            text-decoration: none;
            margin: 0 10px;
        }

        .contact a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 基本信息卡片 -->
        <div class="card">
            <img src="https://picsum.photos/200/200" alt="头像" class="avatar">
            <h1>zzb</h1>
            <div class="title">前端爱好者 | 乐观学习者 | 生活记录者</div>

            <p>你好！我是zzb，一名热爱技术、喜欢探索新鲜事物的学习者。性格开朗，做事认真，乐于沟通，喜欢在实践中不断提升自己。</p>
        </div>

        <!-- 技能卡片 -->
        <div class="card">
            <h3 class="section-title">我的技能</h3>
            <ul>
                <li>基础 HTML / CSS / JavaScript</li>
                <li>简单网页制作与美化</li>
                <li>Office 办公软件</li>
                <li>快速学习与问题解决</li>
            </ul>
        </div>

        <!-- 爱好卡片 -->
        <div class="card">
            <h3 class="section-title">我的爱好</h3>
            <ul>
                <li>编程、做网页</li>
                <li>听音乐、看电影</li>
                <li>阅读、写作</li>
                <li>运动、散步</li>
            </ul>
        </div>

        <!-- 联系方式 -->
        <div class="card contact">
            <h3 class="section-title">联系我</h3>
            <div>
                <a href="mailto:zzb@mail.com">zzb@mail.com</a>
                <a href="#">微信：zzb123</a>
            </div>
        </div>
    </div>
</body>
</html>
